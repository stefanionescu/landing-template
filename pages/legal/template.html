<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{PAGE_TITLE}}</title>
    <meta name="description" content="{{META_DESCRIPTION}}" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />
    <meta name="theme-color" content="{{THEME_COLOR}}" />
    <link rel="stylesheet" href="/styles.css?v={{BUILD_VERSION}}" />
    <script src="/shared/consent.js?v={{BUILD_VERSION}}"></script>
    <script>
      __ANALYTICS_CONFIG_SCRIPT__;
    </script>
    <script src="/shared/analytics.js?v={{BUILD_VERSION}}"></script>
  </head>
  <body>
    <main class="legal-page">{{CONTENT}}</main>

    <div
      id="consent-banner"
      class="consent-banner"
      role="dialog"
      aria-label="{{CONSENT_ARIA_LABEL}}"
      hidden
    >
      <div class="consent-content">
        <p class="consent-text">{{CONSENT_MESSAGE}}</p>
        <div class="consent-actions">
          <button type="button" class="consent-btn consent-btn-reject">
            {{CONSENT_REJECT_LABEL}}
          </button>
          <button type="button" class="consent-btn consent-btn-accept">
            {{CONSENT_ACCEPT_LABEL}}
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
